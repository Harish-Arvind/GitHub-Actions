---
- name: Run Backend API container 1
  docker_container:
    name: backend-1
    image: harisharvind/tp-devops-simple-api:latest
    pull: true
    state: started
    restart_policy: unless-stopped
    networks:
      - name: front-network
      - name: back-network
    env:
      DB_URL: "jdbc:postgresql://database:5432/{{ db_name }}"
      DB_USERNAME: "{{ db_user }}"
      DB_PASSWORD: "{{ db_pass }}"

- name: Run Backend API container 2
  docker_container:
    name: backend-2
    image: harisharvind/tp-devops-simple-api:latest
    pull: true
    state: started
    restart_policy: unless-stopped
    networks:
      - name: front-network
      - name: back-network
    env:
      DB_URL: "jdbc:postgresql://database:5432/{{ db_name }}"
      DB_USERNAME: "{{ db_user }}"
      DB_PASSWORD: "{{ db_pass }}"
