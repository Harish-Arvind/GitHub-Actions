---
- name: Run Database container
  docker_container:
    name: database
    image: harisharvind/tp-devops-database:latest
    pull: true
    state: started
    restart_policy: unless-stopped
    networks:
      - name: back-network
    env:
      POSTGRES_DB: "{{ db_name }}"
      POSTGRES_USER: "{{ db_user }}"
      POSTGRES_PASSWORD: "{{ db_pass }}"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "{{ db_user }}", "-d", "{{ db_name }}"]
      interval: 5s
      timeout: 5s
      retries: 5
