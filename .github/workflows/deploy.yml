name: "🚀 Manual Server Deployment"

on:
  workflow_dispatch:

jobs:
  # ----------------------------------------
  # 7. DEPLOY TO PRODUCTION (ANSIBLE)
  # ----------------------------------------
  deploy-app:
    name: Deploy to EC2/Server via Ansible
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.ANSIBLE_PRIVATE_KEY }}
          name: id_rsa
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Create Vault Password File
        run: echo "${{ secrets.VAULT_PASSWORD }}" > ansible/.vault_pass

      - name: Run Ansible (Dockerized)
        run: |
          docker run --rm \
            -v $(pwd)/ansible:/ansible \
            -v ~/.ssh/id_rsa:/root/.ssh/id_rsa:ro \
            -e ANSIBLE_HOST_KEY_CHECKING=False \
            cytopia/ansible:latest-tools \
            ansible-playbook -i /ansible/hosts /ansible/deploy_app.yml --vault-password-file /ansible/.vault_pass
