name: CI test-backend

on:
  push:
    branches: 
      - main
      - develop
  pull_request:

jobs:
  # ----------------------------------------
  # 1. TEST JOB
  # ----------------------------------------
  test-backend: 
    name: Test Backend Code
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and test with Maven
        working-directory: "Backend API/simple-api"
        run: ./mvnw clean verify

  # ----------------------------------------
  # 2. SONARCLOUD QUALITY GATE JOB
  # ----------------------------------------
  sonar-analysis:
    name: SonarCloud Analysis
    needs: test-backend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Analyze with SonarCloud
        working-directory: "Backend API/simple-api"
        run: ./mvnw -B verify sonar:sonar -Dsonar.projectKey=Harish-Arvind_GitHub-Actions -Dsonar.organization=harish-arvind -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }}
