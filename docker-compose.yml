services:
  backend-1:
    build: ./Backend API/simple-api
    restart: on-failure:5
    networks:
      - front-network
      - back-network
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://database:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}

  backend-2:
    build: ./Backend API/simple-api
    restart: on-failure:5
    networks:
      - front-network
      - back-network
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://database:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}

  database:
    build: ./Database
    restart: on-failure:5
    networks:
      - back-network
    volumes:
      - database_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  httpd:
    build: ./httpd
    restart: unless-stopped
    ports:
      - "80:8080"
    networks:
      - front-network
    depends_on:
      - backend-1
      - backend-2

networks:
  front-network:
  back-network:


volumes:
  database_data:
